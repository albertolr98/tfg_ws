teleop_twist_joy_node:
  ros__parameters:
    # --- Configuración de Seguridad ---
    require_enable_button: true
    enable_button: 9
    enable_turbo_button: -1
    publish_stamped_twist: true

    # --- Configuración de Movimiento ---
    axis_linear:
      x: 1
      y: 0
    scale_linear:
      x: 0.5
      y: 0.5
    scale_linear_turbo: 1.0

    axis_angular:
      yaw: 2
    scale_angular:
      yaw: 3.0

    inverted_reverse: false
