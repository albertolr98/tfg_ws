# Controller configuration for simulation in /sim namespace
# Used by gz_ros2_control when running with sim_namespace:=/sim

/sim/controller_manager:
  ros__parameters:
    update_rate: 30

    joint_broad:
      type: "joint_state_broadcaster/JointStateBroadcaster"

    omni_wheel_drive_controller:
      type: "omni_wheel_drive_controller/OmniWheelDriveController"


/sim/omni_wheel_drive_controller:
  ros__parameters:
    wheel_offset: 0.0
    wheel_names:
      [
        "base_front_wheel_joint",
        "base_left_wheel_joint",
        "base_right_wheel_joint"
      ]

    robot_radius: 0.21
    wheel_radius: 0.05

    odom_frame_id: sim_odom
    base_frame_id: sim_base_footprint
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.001]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.001]

    open_loop: false
    position_feedback: true
    enable_odom_tf: false  # Disabled to avoid TF conflicts with real robot

    cmd_vel_timeout: 1.0
